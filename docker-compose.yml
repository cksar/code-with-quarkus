version: '3.8'

services:
  db:
    image: postgres:15
    container_name: quarkus-postgres
    environment:
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus
      POSTGRES_DB: quarkus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: quarkus-app
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      - db
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/quarkus
      QUARKUS_DATASOURCE_USERNAME: quarkus
      QUARKUS_DATASOURCE_PASSWORD: quarkus
      QUARKUS_HTTP_CORS_ENABLED: "true"
      QUARKUS_HTTP_CORS_ORIGINS: "/.*/"
      QUARKUS_HTTP_CORS_HEADERS: "*"
    volumes:
      - ~/quarkus-cert/keystore.p12:/deployments/certs/keystore.p12:ro

volumes:
  postgres_data: